  function submitForm(e) {
    e.preventDefault();
    setStatus("sending");
    fetch("/", {
      method: "POST",
      headers: { "Content-Type": "application/x-www-form-urlencoded" },
      body: encodeForm({ "form-name": "contact", name: form.name, email: form.email, message: form.message })
    })
      .then(function() { setStatus("sent"); })
      .catch(function() { setStatus("error"); });
  }

  const langBtn = function(code, label) {
    const active = lang === code;
    return (
      <button
        onClick={function() { setLang(code); }}
        style={{
          border: "none", cursor: "pointer", font: "600 12px 'Readex Pro',sans-serif",
          padding: "6px 12px", borderRadius: 999,
          background: active ? "#1b3764" : "transparent",
          color: active ? "#fff" : "#5f6b7d"
        }}
      >{label}</button>
    );
  };

  return (
    <div dir={dir} style={{ minHeight: "100vh", background: "#faf7f2" }}>

      <header className="hkmt-header" style={{ position: "sticky", top: 0, zIndex: 50, display: "flex", alignItems: "center", justifyContent: "space-between", padding: "16px 56px", background: "rgba(250,247,242,.92)", backdropFilter: "blur(8px)", borderBottom: "1px solid #ece7de" }}>
        <a href="#accueil" dir="ltr" style={{ display: "flex", alignItems: "center", textDecoration: "none" }}>
          <img src={LOGO_SRC} alt="HKMT Solutions" style={{ height: 38, display: "block" }} />
        </a>
        <nav className="hkmt-nav" style={{ display: "flex", alignItems: "center", gap: 30, font: "500 15px 'Readex Pro',sans-serif", color: "#33415c" }}>
          <a className="hkmt-nav-link" href="#accueil" style={{ textDecoration: "none", color: "#33415c" }}>{t.navHome}</a>
          <a className="hkmt-nav-link" href="#services" style={{ textDecoration: "none", color: "#33415c" }}>{t.navServices}</a>
          <a className="hkmt-nav-link" href="#apropos" style={{ textDecoration: "none", color: "#33415c" }}>{t.navAbout}</a>
          <a className="hkmt-nav-link" href="#contact" style={{ background: "#1b3764", color: "#fff", padding: "10px 24px", borderRadius: 999, textDecoration: "none" }}>{t.navContact}</a>
          <div style={{ display: "flex", gap: 2, background: "#ece7de", borderRadius: 999, padding: 3 }}>
            {langBtn("fr", "FR")}
            {langBtn("en", "EN")}
            {langBtn("ar", "AR")}
          </div>
        </nav>
      </header>

      <section id="accueil" className="hkmt-hero hkmt-section" style={{ display: "grid", gridTemplateColumns: "1.15fr 1fr", gap: 48, alignItems: "center", padding: "72px 56px 80px", maxWidth: 1200, margin: "0 auto" }}>
        <div>
          <div style={{ display: "inline-block", background: "#fdeeda", color: "#c97800", font: "600 13px 'Readex Pro',sans-serif", padding: "7px 16px", borderRadius: 999, marginBottom: 22 }}>{t.heroBadge}</div>
          <h1 style={{ margin: "0 0 22px", font: "600 46px/1.35 'Readex Pro',sans-serif", color: "#1b3764" }}>{t.heroTitle}</h1>
          <p style={{ margin: "0 0 34px", font: "300 18px/1.9 'Readex Pro',sans-serif", color: "#5f6b7d", maxWidth: 540 }}>{t.heroText}</p>
          <div style={{ display: "flex", gap: 18, alignItems: "center", flexWrap: "wrap" }}>
            <a className="hkmt-cta" href="#contact" style={{ background: "#f39200", color: "#fff", padding: "15px 36px", borderRadius: 999, font: "600 16px 'Readex Pro',sans-serif", textDecoration: "none", boxShadow: "0 6px 18px rgba(243,146,0,.3)" }}>{t.heroCta}</a>
            <a href="#services" style={{ color: "#1b3764", font: "500 15px 'Readex Pro',sans-serif", borderBottom: "2px solid #f39200", paddingBottom: 2, textDecoration: "none" }}>{t.heroCta2}</a>
          </div>
        </div>
        <div style={{ background: "linear-gradient(145deg,#1b3764,#2a4d85)", borderRadius: 28, height: 380, position: "relative", overflow: "hidden", display: "flex", alignItems: "center", justifyContent: "center" }}>
          <div style={{ position: "absolute", right: -50, bottom: -50, width: 200, height: 200, borderRadius: "50%", background: "rgba(243,146,0,.25)" }}></div>
          <div style={{ position: "absolute", left: -30, top: -30, width: 130, height: 130, borderRadius: "50%", border: "2px solid rgba(255,255,255,.15)" }}></div>
          <div style={{ textAlign: "center", color: "#c8d3e4", font: "300 14px 'Readex Pro',sans-serif", padding: "0 40px" }}>{t.heroImagePlaceholder}</div>
        </div>
      </section>

      <section id="services" className="hkmt-section" style={{ background: "#fff", padding: "80px 56px" }}>
        <div style={{ maxWidth: 1200, margin: "0 auto" }}>
          <h2 style={{ margin: "0 0 10px", font: "600 32px 'Readex Pro',sans-serif", color: "#1b3764" }}>{t.servicesTitle}</h2>
          <p style={{ margin: "0 0 40px", font: "300 17px/1.8 'Readex Pro',sans-serif", color: "#5f6b7d", maxWidth: 640 }}>{t.servicesIntro}</p>
          <div className="hkmt-services-grid" style={{ display: "grid", gridTemplateColumns: "repeat(3,1fr)", gap: 22 }}>
            {t.services.map(function(svc, i) {
              return (
                <div key={i} className="hkmt-card" style={{ background: "#faf7f2", borderRadius: 20, padding: 30, transition: "box-shadow .2s" }}>
                  <div style={{ width: 46, height: 46, borderRadius: 14, background: "#fdeeda", color: "#f39200", display: "flex", alignItems: "center", justifyContent: "center", font: "700 19px 'Readex Pro',sans-serif", marginBottom: 18 }}>{i + 1}</div>
                  <h3 style={{ margin: "0 0 10px", font: "600 18px 'Readex Pro',sans-serif", color: "#1b3764" }}>{svc.title}</h3>
                  <p style={{ margin: 0, font: "300 14px/1.9 'Readex Pro',sans-serif", color: "#5f6b7d" }}>{svc.text}</p>
                </div>
              );
            })}
          </div>
        </div>
      </section>

      <section id="apropos" className="hkmt-section" style={{ padding: "80px 56px" }}>
        <div className="hkmt-about" style={{ maxWidth: 1200, margin: "0 auto", display: "grid", gridTemplateColumns: "1fr 1.2fr", gap: 56, alignItems: "center" }}>
          <div style={{ background: "#ece7de", borderRadius: 28, height: 320, display: "flex", alignItems: "center", justifyContent: "center", color: "#8a8377", font: "300 14px 'Readex Pro',sans-serif", textAlign: "center", padding: "0 30px" }}>{t.aboutImagePlaceholder}</div>
          <div>
            <h2 style={{ margin: "0 0 18px", font: "600 32px 'Readex Pro',sans-serif", color: "#1b3764" }}>{t.aboutTitle}</h2>
            <p style={{ margin: "0 0 16px", font: "300 17px/2 'Readex Pro',sans-serif", color: "#5f6b7d" }}>{t.aboutText1}</p>
            <p style={{ margin: "0 0 28px", font: "300 17px/2 'Readex Pro',sans-serif", color: "#5f6b7d" }}>{t.aboutText2}</p>
            <div style={{ display: "flex", gap: 36 }}>
              <div><div style={{ font: "700 30px 'Readex Pro',sans-serif", color: "#f39200" }}>{t.aboutStat1}</div><div style={{ font: "300 13px 'Readex Pro',sans-serif", color: "#5f6b7d" }}>{t.aboutStat1Label}</div></div>
              <div><div style={{ font: "700 30px 'Readex Pro',sans-serif", color: "#f39200" }}>{t.aboutStat2}</div><div style={{ font: "300 13px 'Readex Pro',sans-serif", color: "#5f6b7d" }}>{t.aboutStat2Label}</div></div>
            </div>
          </div>
        </div>
      </section>

      <section id="contact" className="hkmt-section" style={{ background: "#1b3764", padding: "80px 56px" }}>
        <div className="hkmt-contact" style={{ maxWidth: 1200, margin: "0 auto", display: "grid", gridTemplateColumns: "1fr 1fr", gap: 56 }}>
          <div>
            <h2 style={{ margin: "0 0 16px", font: "600 32px 'Readex Pro',sans-serif", color: "#fff" }}>{t.contactTitle}</h2>
            <p style={{ margin: "0 0 30px", font: "300 17px/1.9 'Readex Pro',sans-serif", color: "#c8d3e4" }}>{t.contactText}</p>
            <div style={{ display: "flex", flexDirection: "column", gap: 14, font: "400 16px 'Readex Pro',sans-serif", color: "#fff" }}>
              <div style={{ display: "flex", gap: 12, alignItems: "center" }}><span style={{ color: "#f39200" }}>&#9993;</span> info@hkmt.lu</div>
              <div style={{ display: "flex", gap: 12, alignItems: "center" }}><span style={{ color: "#f39200" }}>&#9678;</span> Luxembourg</div>
            </div>
          </div>
          <div style={{ background: "#fff", borderRadius: 24, padding: 36, display: "flex", flexDirection: "column", gap: 16 }}>
            {status === "sent" ? (
              <p style={{ font: "500 16px 'Readex Pro',sans-serif", color: "#1b3764", textAlign: "center", padding: "20px 0" }}>{t.formSent}</p>
            ) : (
              <form onSubmit={submitForm} style={{ display: "flex", flexDirection: "column", gap: 16 }}>
                <input required placeholder={t.formName} value={form.name} onChange={function(e) { setForm(Object.assign({}, form, { name: e.target.value })); }} style={{ border: "1px solid #e0dcd3", borderRadius: 12, padding: "14px 18px", font: "400 15px 'Readex Pro',sans-serif", background: "#faf7f2", outline: "none" }} />
                <input required type="email" placeholder={t.formEmail} value={form.email} onChange={function(e) { setForm(Object.assign({}, form, { email: e.target.value })); }} style={{ border: "1px solid #e0dcd3", borderRadius: 12, padding: "14px 18px", font: "400 15px 'Readex Pro',sans-serif", background: "#faf7f2", outline: "none" }} />
                <textarea required placeholder={t.formMessage} value={form.message} onChange={function(e) { setForm(Object.assign({}, form, { message: e.target.value })); }} rows={4} style={{ border: "1px solid #e0dcd3", borderRadius: 12, padding: "14px 18px", font: "400 15px 'Readex Pro',sans-serif", background: "#faf7f2", outline: "none", resize: "vertical" }}></textarea>
                <button type="submit" disabled={status === "sending"} style={{ border: "none", cursor: "pointer", background: "#f39200", color: "#fff", padding: 15, borderRadius: 999, font: "600 16px 'Readex Pro',sans-serif" }}>
                  {status === "sending" ? "..." : t.formSubmit}
                </button>
                {status === "error" && <p style={{ color: "#c0392b", fontSize: 13, textAlign: "center" }}>{t.formError}</p>}
              </form>
            )}
          </div>
        </div>
      </section>

      <footer style={{ background: "#122846", padding: "26px 56px", display: "flex", justifyContent: "space-between", alignItems: "center", flexWrap: "wrap", gap: 10, font: "300 14px 'Readex Pro',sans-serif", color: "#c8d3e4" }}>
        <span>{t.footerCopyright}</span>
        <span style={{ color: "#f39200" }}>info@hkmt.lu</span>
      </footer>

    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>

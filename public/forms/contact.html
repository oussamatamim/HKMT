<!--
  Static replica of the React contact form (components/Contact.tsx).
  Netlify scans HTML files in the publish output at deploy time to register forms;
  App Router pages are rendered dynamically, so this file lets Netlify detect and
  provision the "contact" form. It is never linked to and never served to visitors.
-->
<!DOCTYPE html>
<html lang="fr">
  <body>
    <form name="contact" data-netlify="true" netlify-honeypot="bot-field">
      <input type="hidden" name="form-name" value="contact" />
      <input name="bot-field" />
      <input type="text" name="name" />
      <input type="email" name="email" />
      <textarea name="message"></textarea>
    </form>
  </body>
</html>
